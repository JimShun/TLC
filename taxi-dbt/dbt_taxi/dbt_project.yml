name: "dbt_taxi"
version: "1.0.0"
config-version: 2

profile: "dbt_taxi"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_taxi:
    staging:
      +materialized: view
      +schema: staging
    silver:
      +materialized: table
      +schema: silver
    marts:
      +materialized: table
      +schema: marts